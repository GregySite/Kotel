<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Kotel - Multi-Vues</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #1a1a1a;
            --accent: #00a2ff;
            --header-bg: #001a33;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-color); 
            color: white; 
            margin: 0; padding: 0;
        }

        header { 
            background: var(--header-bg); 
            padding: 15px; 
            border-bottom: 2px solid var(--accent);
            position: sticky; top: 0; z-index: 100;
            text-align: center;
        }

        h1 { margin: 0; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 1px; }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center; 
            gap: 15px;
            padding: 15px;
            max-width: 1300px; /* Limite pour garder le 3x3 propre */
            margin: 0 auto;
        }

        .cam-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #333;
            /* Forçage strict de 3 colonnes sur PC */
            width: calc(33.333% - 20px); 
            min-width: 300px;
        }

        .cam-title { 
            padding: 10px; font-size: 0.95rem; font-weight: bold; 
            background: #252525; text-align: center; color: var(--accent);
        }

        .video-wrapper { 
            position: relative; width: 100%; padding-top: 56.25%; background: #000; 
        }

        iframe, video { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; 
        }

        @media (max-width: 768px) {
            .cam-card { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <h1>Le Kotel en Direct</h1>
</header>

<div class="container" id="video-grid"></div>

<script>
    const cameras = [
        // Les 3 flux HLS stables (Cast-TV)
        { title: "Vue 1", url: "https://cdn1.cast-tv.com/23595/Live_Kotel1_ABR/playlist.m3u8", type: "hls" },
        { title: "Vue 2", url: "https://cdn1.cast-tv.com/23595/Live_Kotel2_ABR/playlist.m3u8", type: "hls" },
        { title: "Vue 3", url: "https://cdn1.cast-tv.com/23595/Live_Kotel3_ABR/playlist.m3u8", type: "hls" },
        // Les 3 flux YouTube (IDs mis à jour Mai 2026)
        { title: "Vue 4", id: "POgApZQbckI", type: "youtube" }, 
        { title: "Vue 5", id: "QFK1-XaBnlg", type: "youtube" }, 
        { title: "Vue 6", id: "EGfiC6zIpEw", type: "youtube" }
    ];

    const grid = document.getElementById('video-grid');

    cameras.forEach((cam, index) => {
        const card = document.createElement('div');
        card.className = 'cam-card';
        
        let content = (cam.type === "youtube") 
            ? `<iframe src="https://www.youtube.com/embed/${cam.id}?autoplay=1&mute=1&rel=0" allowfullscreen></iframe>`
            : `<video id="video-${index}" controls autoplay muted playsinline></video>`;

        card.innerHTML = `
            <div class="cam-title">${cam.title}</div>
            <div class="video-wrapper">${content}</div>
        `;
        grid.appendChild(card);

        if (cam.type === "hls") {
            const video = document.getElementById(`video-${index}`);
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(cam.url);
                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = cam.url;
            }
        }
    });
</script>

</body>
</html>
