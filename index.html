<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Kotel - Multi-Vues</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #1a1a1a;
            --accent: #00a2ff;
            --header-bg: #001a33;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-color); 
            color: white; 
            margin: 0; padding: 0;
        }

        header { 
            background: var(--header-bg); 
            padding: 15px; 
            border-bottom: 2px solid var(--accent);
            position: sticky; top: 0; z-index: 100;
            text-align: center;
        }

        h1 { margin: 0; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 1px; color: white; }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center; 
            gap: 15px;
            padding: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .cam-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #333;
            width: calc(33.333% - 20px); 
            min-width: 300px;
            transition: border-color 0.3s;
        }

        .cam-card:hover {
            border-color: var(--accent);
        }

        .cam-title { 
            padding: 10px; font-size: 0.95rem; font-weight: bold; 
            background: #252525; text-align: center; color: var(--accent);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* Petit point d'état de la caméra */
        .status-dot {
            height: 10px; width: 10px; background-color: #00ff00; border-radius: 50%; display: inline-block;
            box-shadow: 0 0 5px #00ff00;
        }
        .status-dot.offline { background-color: #ff0000; box-shadow: 0 0 5px #ff0000; }

        .video-wrapper { 
            position: relative; width: 100%; padding-top: 56.25%; background: #000; 
        }

        iframe, video { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; 
        }

        .error-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff4444; font-size: 0.9rem; text-align: center; display: none;
            width: 80%; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px;
        }

        @media (max-width: 768px) {
            .cam-card { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <h1>Le Kotel en Direct</h1>
</header>

<div class="container" id="video-grid"></div>

<script>
    // Mix hybride : Les serveurs officiels + sources alternatives fiables
    const cameras = [
        { title: "Esplanade", url: "https://cdn1.cast-tv.com/23595/Live_Kotel1_ABR/playlist.m3u8", type: "hls" },
        { title: "Section Hommes", url: "https://cdn1.cast-tv.com/23595/Live_Kotel2_ABR/playlist.m3u8", type: "hls" },
        { title: "Section Femmes", url: "https://cdn1.cast-tv.com/23595/Live_Kotel3_ABR/playlist.m3u8", type: "hls" },
        { title: "Pano (Aish)", id: "POgApZQbckI", type: "youtube" }, // Testé et approuvé précédemment
        { title: "Pano (Skyline)", id: "LueIPEfeFyo", type: "youtube" }, // Flux 24/7 alternatif
        { title: "Large (EarthCam)", url: "https://video3.earthcam.com/fecnetwork/7949.flv/playlist.m3u8", type: "hls" } // HLS direct externe
    ];

    const grid = document.getElementById('video-grid');

    cameras.forEach((cam, index) => {
        const card = document.createElement('div');
        card.className = 'cam-card';
        
        let mediaContent = "";
        if (cam.type === "youtube") {
            mediaContent = `<iframe src="https://www.youtube.com/embed/${cam.id}?autoplay=1&mute=1&rel=0&modestbranding=1" allowfullscreen></iframe>`;
        } else {
            mediaContent = `<video id="video-${index}" controls autoplay muted playsinline></video>`;
        }

        card.innerHTML = `
            <div class="cam-title">
                ${cam.title} <span class="status-dot" id="dot-${index}"></span>
            </div>
            <div class="video-wrapper">
                ${mediaContent}
                <div class="error-msg" id="error-${index}">Flux hors ligne (Maintenance du serveur source)</div>
            </div>
        `;
        grid.appendChild(card);

        // Gestion de la robustesse des flux HLS
        if (cam.type === "hls") {
            const video = document.getElementById(`video-${index}`);
            const errorMsg = document.getElementById(`error-${index}`);
            const dot = document.getElementById(`dot-${index}`);

            if (Hls.isSupported()) {
                const hls = new Hls({ debug: false });
                hls.loadSource(cam.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(() => console.log("Autoplay bloqué par le navigateur"));
                });
                
                // Si le serveur du Kotel coupe le flux, on affiche l'erreur proprement
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        video.style.display = 'none';
                        errorMsg.style.display = 'block';
                        dot.classList.add('offline');
                        hls.destroy();
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = cam.url;
                video.addEventListener('error', () => {
                    video.style.display = 'none';
                    errorMsg.style.display = 'block';
                    dot.classList.add('offline');
                });
            }
        }
    });
</script>

</body>
</html>
