<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotel Live - Multi-Vues</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; margin: 0; }
        header { background: #002244; text-align: center; padding: 20px; border-bottom: 2px solid #a0c4ff; }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .cam-card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .cam-title { padding: 12px; font-weight: bold; background: #222; text-align: center; }
        .video-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .btn-link { 
            display: block; text-align: center; padding: 10px; background: #0055a4; 
            color: white; text-decoration: none; font-size: 0.9em; font-weight: bold;
        }
        .btn-link:hover { background: #003366; }
    </style>
</head>
<body>

<header>
    <h1>Direct du Mur des Lamentations</h1>
    <p style="margin:5px 0 0; color:#a0c4ff;">Flux mis à jour - Mars 2026</p>
</header>

<div class="container">

    <div class="cam-card">
        <div class="cam-title">Esplanade - Direct</div>
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/POgApZQbckI?autoplay=1&mute=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <a href="https://www.youtube.com/watch?v=POgApZQbckI" target="_blank" class="btn-link">Ouvrir sur YouTube</a>
    </div>

    <div class="cam-card">
        <div class="cam-title">Vue Panoramique - Aish</div>
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/8itS3V99vR0?autoplay=1&mute=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <a href="https://www.youtube.com/watch?v=8itS3V99vR0" target="_blank" class="btn-link">Ouvrir sur YouTube</a>
    </div>

    <div class="cam-card">
        <div class="cam-title">EarthCam HD</div>
        <div class="video-wrapper">
            <iframe src="https://www.earthcam.com/js/common/embed/embed.php?vid=westernwall&w=1200" allowfullscreen></iframe>
        </div>
        <a href="https://www.earthcam.com/world/israel/jerusalem/?cam=westernwall" target="_blank" class="btn-link">Ouvrir sur EarthCam</a>
    </div>

</div>

</body>
</html>
