<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotel Live - Multi-Vues</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; text-align: center; }
        header { padding: 20px; background: #003366; }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .cam-card { background: #333; border-radius: 10px; overflow: hidden; padding-bottom: 10px; }
        video { width: 100%; aspect-ratio: 16/9; background: black; }
        h2 { font-size: 1.1em; margin: 10px; }
        @media (max-width: 500px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>Direct du Kotel</h1>
    <p>Flux en temps réel</p>
</header>

<div class="container" id="video-grid">
    </div>

<script>
    // --- ZONE DE CONFIGURATION : AJOUTE TES LIENS ICI ---
    const sources = [
        { title: "Vue Esplanade (Cast-TV)", url: "https://cdn1.cast-tv.com/23595/Live_Kotel3_ABR/23595/Live_Kotel3_11SP/chunks.m3u8" },
        { title: "Vue Panoramique (EarthCam)", url: "https://videos-3.earthcam.com/fecnetwork/7949.flv/playlist.m3u8" }
        // Pour ajouter un lien, tu copies la ligne au dessus et tu changes le titre et l'URL.
    ];
    // ---------------------------------------------------

    const grid = document.getElementById('video-grid');

    sources.forEach((source, index) => {
        // Création de l'élément HTML
        const card = document.createElement('div');
        card.className = 'cam-card';
        card.innerHTML = `
            <h2>${source.title}</h2>
            <video id="video-${index}" controls autoplay muted playsinline></video>
        `;
        grid.appendChild(card);

        const video = document.getElementById(`video-${index}`);

        // Initialisation du lecteur HLS
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(source.url);
            hls.attachMedia(video);
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Pour Safari (iPhone/Mac) qui lit le HLS nativement
            video.src = source.url;
        }
    });
</script>

</body>
</html>
