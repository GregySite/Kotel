<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Kotel - Multi-Vues LIVE</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; margin: 0; text-align: center; }
        header { background: #002244; padding: 20px; border-bottom: 2px solid #a0c4ff; }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .cam-card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .cam-title { padding: 12px; font-weight: bold; background: #222; }
        .video-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .info-bar { padding: 10px; font-size: 0.8em; color: #888; background: #1a1a1a; }
    </style>
</head>
<body>

<header>
    <h1>Kotel - Direct</h1>
    <p style="color: #00ff00; font-size: 0.9em;">● Flux vérifiés en temps réel</p>
</header>

<div class="container" id="video-grid">
    </div>

<script>
    /* --- CONFIGURATION DES LIENS ---
       Si un lien ne marche plus, remplace juste l'ID (les 11 caractères après v=)
    */
    const cameras = [
        { 
            title: "Vue Esplanade (Officiel)", 
            youtubeId: "yAl9L9mvDzY" // ID actuel du direct de la Fondation
        },
        { 
            title: "Vue Panoramique (EarthCam)", 
            youtubeId: "77akujLn4k8" // ID actuel du direct EarthCam
        },
        { 
            title: "Mont des Oliviers (Vue d'ensemble)", 
            youtubeId: "UyduhBUpO7Q" // ID actuel du Prayer Bridge
        }
    ];

    const grid = document.getElementById('video-grid');

    cameras.forEach(cam => {
        const card = document.createElement('div');
        card.className = 'cam-card';
        card.innerHTML = `
            <div class="cam-title">${cam.title}</div>
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/${cam.youtubeId}?autoplay=1&mute=1&rel=0" 
                        allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
            <div class="info-bar">ID Source : ${cam.youtubeId}</div>
        `;
        grid.appendChild(card);
    });
</script>

</body>
</html>
