<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotel Live - Multi-Vues</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; margin: 0; }
        header { background: #002244; text-align: center; padding: 20px; border-bottom: 2px solid #a0c4ff; }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .cam-card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .cam-title { padding: 12px; font-weight: bold; background: #222; text-align: center; }
        .video-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .footer-links { padding: 10px; display: flex; justify-content: space-around; background: #1a1a1a; }
        .btn-link { 
            color: #a0c4ff; text-decoration: none; font-size: 0.8em; border: 1px solid #333; padding: 5px 10px; border-radius: 4px;
        }
        .btn-link:hover { background: #333; }
    </style>
</head>
<body>

<header>
    <h1>Mur des Lamentations - Direct</h1>
</header>

<div class="container">

    <div class="cam-card">
        <div class="cam-title">Esplanade - Direct</div>
        <div class="video-wrapper">
            <iframe src="https://www.youtube-nocookie.com/embed/POgApZQbckI?autoplay=1&mute=1&rel=0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
        </div>
        <div class="footer-links">
            <a href="https://www.youtube.com/watch?v=POgApZQbckI" target="_blank" class="btn-link">Lien direct YouTube</a>
        </div>
    </div>

    <div class="cam-card">
        <div class="cam-title">Vue Panoramique - Aish</div>
        <div class="video-wrapper">
            <iframe src="https://www.youtube-nocookie.com/embed/8itS3V99vR0?autoplay=1&mute=1&rel=0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
        </div>
        <div class="footer-links">
            <a href="https://www.youtube.com/watch?v=8itS3V99vR0" target="_blank" class="btn-link">Lien direct YouTube</a>
        </div>
    </div>

</div>

<p style="text-align:center; font-size:0.8em; color:#666; margin-top:20px;">
    Note : Si les vidéos ne s'affichent pas, essayez d'ouvrir ce fichier avec un autre navigateur (Firefox par exemple) <br> ou de l'héberger sur une plateforme comme GitHub Pages ou Vercel.
</p>

</body>
</html>
