<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotel Live - Multi-Vues</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0a0a0a; 
            color: white; 
            margin: 0; 
            padding: 0;
        }
        header { 
            background: linear-gradient(135deg, #002244 0%, #001122 100%);
            text-align: center; 
            padding: 15px; 
            border-bottom: 1px solid #1a3a5a;
        }
        h1 { margin: 0; font-size: 1.6em; text-transform: uppercase; letter-spacing: 2px; }
        
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .cam-card { 
            background: #161616; 
            border-radius: 10px; 
            overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            border: 1px solid #222;
        }
        
        .cam-title { 
            padding: 10px 15px; 
            font-size: 0.9em;
            font-weight: bold; 
            background: #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-live {
            color: #ff3333;
            font-size: 0.8em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #ff3333;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; }

        @media (max-width: 600px) {
            .container { grid-template-columns: 1fr; padding: 10px; }
        }
    </style>
</head>
<body>

<header>
    <h1>Mur des Lamentations</h1>
</header>

<div class="container" id="video-grid"></div>

<script>
    // --- LES SOURCES TROUVÉES PAR DEEP RESEARCH ---
    const sources = [
        { 
            title: "Flux Officiel (Heritage Foundation)", 
            url: "https://il28.cast-tv.com:1935/23595_LIVE_Kotel_Live/_definst_//23595_LIVE_Kotel_Live/playlist.m3u8"
        },
        { 
            title: "Vue Aish HaTorah (EarthCam)", 
            url: "https://video3.earthcam.com/fecnetwork/7949.flv/playlist.m3u8" 
        },
        { 
            title: "Vue Secondaire (Reali-Tech)", 
            url: "https://server1.reali-tech.com:1935/live/dolphin.stream/playlist.m3u8"
        }
    ];

    const grid = document.getElementById('video-grid');

    sources.forEach((source, index) => {
        const card = document.createElement('div');
        card.className = 'cam-card';
        card.innerHTML = `
            <div class="cam-title">
                <span>${source.title}</span>
                <span class="status-live"><span class="dot"></span> EN DIRECT</span>
            </div>
            <div class="video-wrapper">
                <video id="video-${index}" controls autoplay muted playsinline></video>
            </div>
        `;
        grid.appendChild(card);

        const video = document.getElementById(`video-${index}`);

        if (Hls.isSupported()) {
            const hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
                backBufferLength: 90
            });
            hls.loadSource(source.url);
            hls.attachMedia(video);
            
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            console.log("Erreur réseau, tentative de reconnexion...");
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            console.log("Erreur média, tentative de récupération...");
                            hls.recoverMediaError();
                            break;
                        default:
                            hls.destroy();
                            break;
                    }
                }
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = source.url;
        }
    });
</script>

</body>
</html>
