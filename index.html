<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Kotel - Multi-Vues Permanent</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #1a1a1a;
            --accent: #00a2ff;
            --header-bg: #001a33;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: white; margin: 0; padding: 0; }

        header { 
            background: var(--header-bg); padding: 15px; border-bottom: 2px solid var(--accent);
            position: sticky; top: 0; z-index: 100; text-align: center;
        }

        h1 { margin: 0; font-size: 1.4rem; text-transform: uppercase; }
        .status { color: #00ff00; font-size: 0.8rem; font-weight: bold; margin-top: 5px; }

        .container {
            display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 15px; padding: 15px; max-width: 100%; margin: 0 auto;
        }

        .cam-card { 
            background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #333;
            width: 31%; /* 3 par ligne sur PC */
            min-width: 320px;
        }

        .cam-title { padding: 10px; font-size: 0.9rem; font-weight: 600; background: #252525; text-align: center; }

        .video-wrapper { position: relative; width: 100%; padding-top: 56.25%; background: #000; }

        video, iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Bouton Refresh pour relancer les flux si ça freeze */
        #refresh-btn {
            position: fixed; bottom: 20px; right: 20px; background: var(--accent);
            color: white; border: none; padding: 10px 20px; border-radius: 50px;
            cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000;
        }

        @media (max-width: 768px) {
            .cam-card { width: 100%; }
            h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>Direct du Mur des Lamentations</h1>
    <div class="status">● FLUX SOURCES SÉCURISÉS (HLS)</div>
</header>

<button id="refresh-btn" onclick="location.reload()">Rafraîchir les caméras</button>

<div class="container" id="video-grid"></div>

<script>
    // Ces liens sont les flux directs officiels (HLS). Ils sont BEAUCOUP plus stables que YouTube.
    const cameras = [
        { title: "Esplanade - Vue Principale", url: "https://cdn1.cast-tv.com/23595/Live_Kotel1_ABR/playlist.m3u8", type: "hls" },
        { title: "Section des Femmes", url: "https://cdn1.cast-tv.com/23595/Live_Kotel2_ABR/playlist.m3u8", type: "hls" },
        { title: "Vue Panoramique", url: "https://cdn1.cast-tv.com/23595/Live_Kotel3_ABR/playlist.m3u8", type: "hls" },
        { title: "Pont des Prières", url: "https://cdn1.cast-tv.com/23595/Live_Kotel4_ABR/playlist.m3u8", type: "hls" },
        { title: "Arche de Wilson", url: "https://cdn1.cast-tv.com/23595/Live_Kotel5_ABR/playlist.m3u8", type: "hls" },
        { title: "Vue Large Haute", url: "https://cdn1.cast-tv.com/23595/Live_Kotel6_ABR/playlist.m3u8", type: "hls" }
    ];

    const grid = document.getElementById('video-grid');

    cameras.forEach((cam, index) => {
        const card = document.createElement('div');
        card.className = 'cam-card';
        
        card.innerHTML = `
            <div class="cam-title">${cam.title}</div>
            <div class="video-wrapper">
                <video id="video-${index}" controls autoplay muted playsinline></video>
            </div>
        `;
        grid.appendChild(card);

        const video = document.getElementById(`video-${index}`);
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(cam.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = cam.url;
        }
    });
</script>

</body>
</html>
