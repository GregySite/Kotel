<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Kotel - Multi-Vues LIVE</title>
    <style>
        /* Couleurs et Base */
        :root {
            --bg-color: #050505;
            --card-bg: #1a1a1a;
            --accent: #00a2ff;
            --header-bg: #001a33;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-color); 
            color: white; 
            margin: 0; 
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        header { 
            background: var(--header-bg); 
            padding: 15px; 
            border-bottom: 2px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { margin: 0; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 1px; }
        .live-indicator { color: #00ff00; font-size: 0.8rem; font-weight: bold; margin-top: 5px; }

        /* Conteneur Flexbox (La magie opère ici) */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center; /* Centre les vidéos de la dernière ligne */
            gap: 20px;
            padding: 20px;
            max-width: 1500px; /* Limite la largeur pour forcer 3 belles colonnes */
            margin: 0 auto;
        }

        .cam-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #333;
            transition: transform 0.2s ease;
            
            /* Calcul : 33.33% de la largeur moins l'espace du gap (20px) */
            width: calc(33.333% - 14px); 
        }

        /* Titre de la caméra */
        .cam-title { 
            padding: 10px; 
            font-size: 0.95rem; 
            font-weight: 600; 
            background: #252525;
            border-bottom: 1px solid #333;
            text-align: center;
        }

        /* Ratio 16:9 responsive */
        .video-wrapper { 
            position: relative; 
            width: 100%; 
            padding-top: 56.25%; /* Ratio 16:9 */
            background: #000; 
        }

        iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        /* Optimisations Tablette (2 par ligne) */
        @media (max-width: 1000px) {
            .cam-card { width: calc(50% - 10px); }
        }

        /* Optimisations Mobile (1 par ligne) */
        @media (max-width: 600px) {
            h1 { font-size: 1.1rem; }
            .container { padding: 10px; gap: 15px; }
            .cam-title { font-size: 0.85rem; padding: 8px; }
            .cam-card { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <h1>Le Kotel en Direct</h1>
    <div class="live-indicator">● LIVE JÉRUSALEM</div>
</header>

<div class="container" id="video-grid">
    </div>

<script>
    // Configuration des IDs YouTube actuels
    const cameras = [
        { title: "Esplanade", id: "yAl9L9mvDzY" },
        { title: "Panoramique", id: "77akujLn4k8" },
        { title: "Pont", id: "UyduhBUpO7Q" },
        { title: "Pano large", id: "EGfiC6zIpEw" },
        { title: "הכותל", id: "QFK1-XaBnlg" }
    ];

    const grid = document.getElementById('video-grid');

    cameras.forEach(cam => {
        const card = document.createElement('div');
        card.className = 'cam-card';
        card.innerHTML = `
            <div class="cam-title">${cam.title}</div>
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/${cam.id}?autoplay=1&mute=1&rel=0&modestbranding=1" 
                        allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        `;
        grid.appendChild(card);
    });
</script>

</body>
</html>
