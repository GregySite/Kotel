<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Kotel en Direct - Auto</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #1a1a1a;
            --accent: #00a2ff;
            --header-bg: #001a33;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-color); 
            color: white; 
            margin: 0; padding: 0;
        }

        header { 
            background: var(--header-bg); 
            padding: 15px; 
            border-bottom: 2px solid var(--accent);
            position: sticky; top: 0; z-index: 100;
            text-align: center;
        }

        h1 { margin: 0; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 1px; }
        .live-indicator { color: #00ff00; font-size: 0.8rem; font-weight: bold; margin-top: 5px; }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center; 
            gap: 15px;
            padding: 15px;
            max-width: 100%;
            margin: 0 auto;
        }

        .cam-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #333;
            width: 31%; /* 3 par ligne sur PC */
            min-width: 320px;
        }

        .cam-title { 
            padding: 10px; font-size: 0.95rem; font-weight: 600; 
            background: #252525; text-align: center;
        }

        .video-wrapper { 
            position: relative; width: 100%; padding-top: 56.25%; background: #000; 
        }

        iframe, video { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; 
        }

        @media (max-width: 768px) {
            .cam-card { width: 100%; }
            h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>Le Kotel en Direct</h1>
    <div class="live-indicator">● FLUX AUTOMATISÉS</div>
</header>

<div class="container" id="video-grid"></div>

<script>
    /* ASTUCE : On utilise l'ID de la CHAÎNE (channelId). 
       YouTube redirigera automatiquement vers le flux "Live" actif de cette chaîne.
    */
    const cameras = [
        { title: "Esplanade (Officiel)", channelId: "UCF-H2N5Lw-Vf997_I-K8o0A", type: "youtube_auto" },
        { title: "Panoramique (Aish)", channelId: "UCrM5vT_S-A62_m8Mh-U6A9Q", type: "youtube_auto" },
        { title: "Pont des Prières", channelId: "UCiV7N866qjYV1_6Xp7fC9_A", type: "youtube_auto" },
        { title: "Vue Large", id: "EGfiC6zIpEw", type: "youtube" }, // ID statique si la chaîne n'a qu'une vidéo
        { title: "הכותל המערבי", id: "QFK1-XaBnlg", type: "youtube" },
        { title: "Flux Direct (Cast-TV)", url: "https://cdn1.cast-tv.com/23595/Live_Kotel1_ABR/playlist.m3u8", type: "hls" }
    ];

    const grid = document.getElementById('video-grid');

    cameras.forEach((cam, index) => {
        const card = document.createElement('div');
        card.className = 'cam-card';
        
        let src = "";
        if (cam.type === "youtube_auto") {
            // URL magique qui cherche le live actuel de la chaîne
            src = `https://www.youtube.com/embed/live?channel=${cam.channelId}&autoplay=1&mute=1&rel=0`;
        } else if (cam.type === "youtube") {
            src = `https://www.youtube.com/embed/${cam.id}?autoplay=1&mute=1&rel=0`;
        }

        let content = (cam.type === "hls")
            ? `<video id="video-${index}" controls autoplay muted playsinline></video>`
            : `<iframe src="${src}" allowfullscreen allow="autoplay"></iframe>`;

        card.innerHTML = `
            <div class="cam-title">${cam.title}</div>
            <div class="video-wrapper">${content}</div>
        `;
        grid.appendChild(card);

        if (cam.type === "hls") {
            const video = document.getElementById(`video-${index}`);
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(cam.url);
                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = cam.url;
            }
        }
    });
</script>

</body>
</html>
