<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Kotel - Multi-Vues</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #1a1a1a;
            --accent: #00a2ff;
            --header-bg: #001a33;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-color); 
            color: white; 
            margin: 0; padding: 0;
        }

        header { 
            background: var(--header-bg); 
            padding: 15px; 
            border-bottom: 2px solid var(--accent);
            position: sticky; top: 0; z-index: 100;
            text-align: center;
        }

        h1 { margin: 0; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 1px; color: white; }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center; 
            gap: 15px;
            padding: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .cam-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #333;
            width: calc(33.333% - 20px); 
            min-width: 300px;
            transition: border-color 0.3s;
        }

        .cam-card:hover {
            border-color: var(--accent);
        }

        .cam-title { 
            padding: 10px; font-size: 0.95rem; font-weight: bold; 
            background: #252525; text-align: center; color: var(--accent);
        }

        .video-wrapper { 
            position: relative; width: 100%; padding-top: 56.25%; background: #000; 
        }

        video { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; 
        }

        @media (max-width: 768px) {
            .cam-card { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <h1>Le Kotel en Direct</h1>
</header>

<div class="container" id="video-grid"></div>

<script>
    // Utilisation des flux directs HLS (beaucoup plus stables que YouTube)
    const cameras = [
        { title: "Vue 1", url: "https://cdn1.cast-tv.com/23595/Live_Kotel1_ABR/playlist.m3u8" },
        { title: "Vue 2", url: "https://cdn1.cast-tv.com/23595/Live_Kotel2_ABR/playlist.m3u8" },
        { title: "Vue 3", url: "https://cdn1.cast-tv.com/23595/Live_Kotel3_ABR/playlist.m3u8" },
        { title: "Vue 4", url: "https://cdn1.cast-tv.com/23595/Live_Kotel4_ABR/playlist.m3u8" },
        { title: "Vue 5", url: "https://cdn1.cast-tv.com/23595/Live_Kotel5_ABR/playlist.m3u8" },
        { title: "Vue 6", url: "https://cdn1.cast-tv.com/23595/Live_Kotel6_ABR/playlist.m3u8" }
    ];

    const grid = document.getElementById('video-grid');

    cameras.forEach((cam, index) => {
        const card = document.createElement('div');
        card.className = 'cam-card';
        
        card.innerHTML = `
            <div class="cam-title">${cam.title}</div>
            <div class="video-wrapper">
                <video id="video-${index}" controls autoplay muted playsinline></video>
            </div>
        `;
        grid.appendChild(card);

        const video = document.getElementById(`video-${index}`);
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(cam.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play().catch(e => console.log("Auto-play prevented"));
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = cam.url;
        }
    });
</script>

</body>
</html>
