<script>
    // --- CONFIGURATION FACILE ---
    // Type "hls" pour les liens directs .m3u8
    // Type "iframe" pour les lecteurs YouTube ou sites tiers
    const sources = [
        { 
            title: "Vue Esplanade (Stable)", 
            url: "https://cdn1.cast-tv.com/23595/Live_Kotel3_ABR/23595/Live_Kotel3_11SP/chunks.m3u8",
            type: "hls"
        },
        { 
            title: "Vue Panoramique (EarthCam)", 
            url: "https://www.earthcam.com/js/common/embed/embed.php?vid=westernwall&w=1200", 
            type: "iframe"
        }
    ];

    const grid = document.getElementById('video-grid');

    sources.forEach((source, index) => {
        const card = document.createElement('div');
        card.className = 'cam-card';
        
        if (source.type === "hls") {
            card.innerHTML = `
                <h2>${source.title}</h2>
                <video id="video-${index}" controls autoplay muted playsinline></video>
            `;
            grid.appendChild(card);
            const video = document.getElementById(`video-${index}`);
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(source.url);
                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = source.url;
            }
        } else {
            // Pour EarthCam ou YouTube
            card.innerHTML = `
                <h2>${source.title}</h2>
                <div style="aspect-ratio: 16/9;">
                    <iframe src="${source.url}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
                </div>
            `;
            grid.appendChild(card);
        }
    });
</script>
